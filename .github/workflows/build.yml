name: Build GhostPin APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Create project
        run: curl -L https://paste.rs/3Ax4x | bash
      - name: Build APK
        working-directory: ghostpin-android
        run: gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostPin-APK
          path: ghostpin-android/app/build/outputs/apk/debug/app-debug.apk
